<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Noise grain texture -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Ember glow filter for the play triangle -->
    <filter id="emberGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft outer glow for triangle -->
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial background glow (tube-amp warmup) -->
    <radialGradient id="bgGlow" cx="50%" cy="44%" r="56%" fx="50%" fy="40%">
      <stop offset="0%"   stop-color="#1a1411"/>
      <stop offset="35%"  stop-color="#160e0a"/>
      <stop offset="100%" stop-color="#100d0a"/>
    </radialGradient>

    <!-- Ember radial burst from center -->
    <radialGradient id="emberBurst" cx="50%" cy="44%" r="50%">
      <stop offset="0%"   stop-color="#ff8a3d" stop-opacity="0.18"/>
      <stop offset="40%"  stop-color="#ff8a3d" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>

    <!-- Play triangle fill gradient -->
    <linearGradient id="triGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffb061"/>
      <stop offset="55%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#e0a458"/>
    </linearGradient>

    <!-- Inner ring stroke gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e0a458" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#ff8a3d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e0a458" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Clip to square -->
    <clipPath id="squareClip">
      <rect width="512" height="512"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="512" height="512" fill="#100d0a"/>

  <!-- Warm center gradient -->
  <rect width="512" height="512" fill="url(#bgGlow)"/>

  <!-- Ember radial burst -->
  <rect width="512" height="512" fill="url(#emberBurst)"/>

  <!-- ============ DIAL RING SYSTEM ============ -->

  <!-- Outer decorative ring (hairline) -->
  <circle cx="256" cy="256" r="178"
    fill="none"
    stroke="#e0a458" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Main dial ring -->
  <circle cx="256" cy="256" r="162"
    fill="none"
    stroke="url(#ringGrad)" stroke-width="2.5"
    filter="url(#emberGlow)"/>

  <!-- Inner hairline ring -->
  <circle cx="256" cy="256" r="148"
    fill="none"
    stroke="#ff8a3d" stroke-opacity="0.18" stroke-width="0.8"/>

  <!-- Very subtle fill inside dial ring (warmth) -->
  <circle cx="256" cy="256" r="162"
    fill="#100d0a" fill-opacity="0.4"/>

  <!-- ============ TICK MARKS (radio tuner dial) ============ -->
  <!-- 36 ticks every 10 degrees; major ticks at 0,60,120,180,240,300 (every 60deg) -->
  <g stroke="#e0a458" stroke-linecap="round" transform="translate(256,256)">
    <!-- Minor ticks (all 36) -->
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(0)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(10)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(20)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(30)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(40)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(50)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(60)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(70)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(80)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(90)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(100)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(110)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(120)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(130)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(140)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(150)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(160)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(170)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(180)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(190)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(200)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(210)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(220)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(230)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(240)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(250)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(260)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(270)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(280)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(290)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(300)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(310)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(320)"/>
    <line x1="0" y1="-162" x2="0" y2="-154" stroke-opacity="0.35" stroke-width="1"   transform="rotate(330)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(340)"/>
    <line x1="0" y1="-162" x2="0" y2="-156" stroke-opacity="0.25" stroke-width="0.8" transform="rotate(350)"/>

    <!-- Major ticks (every 60 degrees, longer) -->
    <line x1="0" y1="-162" x2="0" y2="-148" stroke-opacity="0.7" stroke-width="1.8" transform="rotate(0)"/>
    <line x1="0" y1="-162" x2="0" y2="-148" stroke-opacity="0.7" stroke-width="1.8" transform="rotate(60)"/>
    <line x1="0" y1="-162" x2="0" y2="-148" stroke-opacity="0.7" stroke-width="1.8" transform="rotate(120)"/>
    <line x1="0" y1="-162" x2="0" y2="-148" stroke-opacity="0.7" stroke-width="1.8" transform="rotate(180)"/>
    <line x1="0" y1="-162" x2="0" y2="-148" stroke-opacity="0.7" stroke-width="1.8" transform="rotate(240)"/>
    <line x1="0" y1="-162" x2="0" y2="-148" stroke-opacity="0.7" stroke-width="1.8" transform="rotate(300)"/>
  </g>

  <!-- ============ PLAY TRIANGLE (centered, slightly optically lifted) ============ -->
  <!-- Triangle pointing right, centered at 256,256, optically lifted ~6px -->
  <!-- Vertices: left-top=(196,196), left-bottom=(196,316), right=(326,256) -->
  <!-- Glow layer (blurred copy) -->
  <polygon points="196,198 196,318 328,258"
    fill="#ff8a3d" fill-opacity="0.45"
    filter="url(#softGlow)"/>

  <!-- Main triangle with gradient fill -->
  <polygon points="196,198 196,318 328,258"
    fill="url(#triGrad)"/>

  <!-- Subtle specular highlight on triangle top-left edge -->
  <polygon points="196,198 196,258 262,228"
    fill="#f4ece2" fill-opacity="0.07"/>

  <!-- ============ GRAIN OVERLAY ============ -->
  <!-- Low-opacity noise layer for warmth -->
  <rect width="512" height="512" fill="#6b4a2a" fill-opacity="0.03" filter="url(#grain)"/>

  <!-- Vignette (darkens corners, keeps center bright) -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%"   stop-color="#100d0a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#100d0a" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#vignette)"/>
</svg>
