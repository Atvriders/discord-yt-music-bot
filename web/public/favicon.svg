<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="YouTube Music Bot">
  <defs>
    <radialGradient id="face" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#241d1e"/>
      <stop offset="1" stop-color="#0a0809"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- console faceplate -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" fill="url(#face)" stroke="#43383a" stroke-width="1"/>
  <!-- "device is on" red rim -->
  <circle cx="16" cy="16" r="9.6" fill="none" stroke="#ff0000" stroke-opacity="0.35" stroke-width="1.2"/>
  <!-- glowing red play key -->
  <path d="M13.2 10.8 L22 16 L13.2 21.2 Z" fill="#ff0000" stroke="#ff5a5a" stroke-width="0.6" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
