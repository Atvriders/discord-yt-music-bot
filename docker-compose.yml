# IMPORTANT: This file contains PLACEHOLDER values.
# Before running `docker compose up`, fill in your real values for:
#   DISCORD_TOKEN, DISCORD_CLIENT_SECRET, SESSION_SECRET
# Keep your filled-in copy LOCAL — do NOT commit real secrets to the repo.

services:
  bot:
    image: ghcr.io/atvriders/discord-yt-music-bot:latest
    pull_policy: always
    environment:
      # Discord bot token
      DISCORD_TOKEN: "CHANGE_ME"

      # Discord OAuth configuration
      DISCORD_CLIENT_ID: "your_client_id_here"
      DISCORD_CLIENT_SECRET: "CHANGE_ME"

      # Application URLs
      PUBLIC_BASE_URL: "http://localhost:8080"
      OAUTH_REDIRECT_URI: "http://localhost:8080/auth/callback"

      # Session and security
      SESSION_SECRET: "CHANGE_ME"

      # Admin user IDs (comma-separated Discord user IDs)
      ADMIN_USER_IDS: "123456789,987654321"

      # Server configuration
      PORT: "8080"
      HOST: "0.0.0.0"
      TRUST_PROXY: "true"

      # Logging
      LOG_LEVEL: "info"

      # Environment
      NODE_ENV: "production"

      # Cache configuration
      CACHE_DIR: "/data/cache"
      CACHE_MAX_MB: "5000"

      # Music player timeouts
      IDLE_TIMEOUT_SEC: "300"

      # History and search limits
      HISTORY_MAX_ITEMS: "100"
      SEARCH_RESULT_COUNT: "10"

      # Download configuration
      PREFETCH_DEPTH: "3"
      MAX_TRANSCODE_JOBS: "4"
      MAX_TRACK_DURATION_SEC: "3600"

      # Audio processing
      SPONSORBLOCK_REMOVE: "sponsor,intro,outro,selfpromo"
      NORMALIZE_LOUDNESS: "false"

      # YouTube configuration
      YT_PROXY: "" # optional residential/SOCKS proxy if your IP gets blocked by YouTube
      YT_COOKIES: "" # optional path to a mounted cookies.txt (helps on flagged/datacenter IPs)
      # Zero-PO-token clients — reliable on most hosts. Do NOT use "web,mweb" unless you run the
      # bgutil PO-token sidecar (`--profile pot`) AND install its yt-dlp plugin in the image,
      # or playback silently fails to extract audio.
      YT_PLAYER_CLIENTS: "android_vr,web_embedded,tv"
      PO_TOKEN_PROVIDER_URL: "" # only set (e.g. http://bgutil-pot:4416) when running `--profile pot`
      # MUST match PUBLIC_BASE_URL exactly, or the live-updates WebSocket is rejected (no live panel)
      ALLOWED_WS_ORIGINS: "http://localhost:8080"
    ports: ["8080:8080"]
    volumes: ["cache:/data/cache"]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    profiles: ["pot"]
    restart: unless-stopped
    expose: ["4416"]
volumes:
  cache:
