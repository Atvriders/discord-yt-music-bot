services:
  bot:
    image: ghcr.io/atvriders/discord-yt-music-bot:latest
    pull_policy: always
    env_file: .env
    environment:
      PO_TOKEN_PROVIDER_URL: "${PO_TOKEN_PROVIDER_URL:-}"
    ports: ["${PORT:-8080}:8080"]
    volumes: ["cache:/data/cache"]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    profiles: ["pot"]
    restart: unless-stopped
    expose: ["4416"]
volumes:
  cache:
