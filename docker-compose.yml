# IMPORTANT: This file contains PLACEHOLDER values.
# Before running `docker compose up`, fill in your real values for:
#   DISCORD_TOKEN, DISCORD_CLIENT_SECRET, SESSION_SECRET
# Keep your filled-in copy LOCAL — do NOT commit real secrets to the repo.

services:
  bot:
    image: ghcr.io/atvriders/discord-yt-music-bot:latest
    pull_policy: always
    environment:
      # Discord bot token
      DISCORD_TOKEN: "CHANGE_ME"

      # ── Additional bots (optional) ────────────────────────────────────────────────
      # Run more bots in this SAME container so each can play a different song in a different
      # voice channel. Each needs its OWN Discord application + bot token, invited to your server,
      # and a DISTINCT command prefix. The web panel gets a bot-picker to choose which one to control.
      # DISCORD_TOKEN_2: ""          # second bot's token (leave "" to disable)
      # COMMAND_PREFIX_2: "!"        # must NOT overlap another prefix — "?"/"?2" clash, so use "!", "$", …
      # BOT_NAME_2: "YouTube Music Bot 2"
      # For a third bot add DISCORD_TOKEN_3 / COMMAND_PREFIX_3 / BOT_NAME_3, and so on (contiguous).

      # Discord OAuth configuration
      DISCORD_CLIENT_ID: "your_client_id_here"
      DISCORD_CLIENT_SECRET: "CHANGE_ME"

      # Application URLs
      PUBLIC_BASE_URL: "http://localhost:8080"
      OAUTH_REDIRECT_URI: "http://localhost:8080/auth/callback"

      # Session and security
      SESSION_SECRET: "CHANGE_ME"

      # Admin user IDs (comma-separated Discord user IDs)
      ADMIN_USER_IDS: "123456789,987654321"

      # Server configuration
      PORT: "8080"
      HOST: "0.0.0.0"
      # Behind an HTTPS reverse proxy (Cloudflare tunnel, nginx, Traefik, …)? Set "true" —
      # otherwise the bot sees plain HTTP, won't set the secure session cookie, and OAuth
      # login fails with "invalid_state". Only leave "false" for DIRECT exposure (no proxy),
      # where it stops clients spoofing X-Forwarded-For to bypass the per-IP rate limiter.
      TRUST_PROXY: "false"

      # Logging
      LOG_LEVEL: "info"

      # Environment
      NODE_ENV: "production"

      # Cache configuration
      CACHE_DIR: "/data/cache"
      CACHE_MAX_MB: "5000"

      # Music player timeouts
      IDLE_TIMEOUT_SEC: "300"

      # History and search limits
      HISTORY_MAX_ITEMS: "100"
      SEARCH_RESULT_COUNT: "10"

      # Download configuration
      PREFETCH_DEPTH: "3"
      MAX_TRANSCODE_JOBS: "4"
      # Seeds the INITIAL per-guild "Max track length" (the panel overrides it per guild).
      # 14400 = 4h so long content (e.g. concerts) plays out-of-box; "" / 0 = no limit.
      MAX_TRACK_DURATION_SEC: "14400"

      # Audio processing — SponsorBlock trims non-song segments out before playback.
      #   music_offtopic = the NON-MUSIC parts of a music video (spoken intros/outros, skits);
      #   intro/outro = title cards & endcards; sponsor/selfpromo = ad reads.
      # Comma-separated; "" disables. Categories: https://wiki.sponsor.ajay.app/w/Segment_Categories
      SPONSORBLOCK_REMOVE: "sponsor,selfpromo,intro,outro,music_offtopic"
      NORMALIZE_LOUDNESS: "false"

      # YouTube configuration
      YT_PROXY: "" # optional residential/SOCKS proxy if your IP gets blocked by YouTube
      # Optional path to a mounted cookies.txt. Most age-restricted videos already play without
      # this (the extraction ladder falls through to the tv_embedded/mediaconnect bypass clients).
      # Provide cookies exported from an 18+ account ONLY for age-restricted videos whose uploader
      # disabled embedding; also helps on flagged/datacenter IPs.
      YT_COOKIES: ""
      # Zero-PO-token clients — reliable on most hosts. Only use "web,mweb" if you also run the
      # bgutil PO-token sidecar (`--profile pot`) and set PO_TOKEN_PROVIDER_URL below; otherwise
      # those clients silently fail to extract audio. (The bgutil yt-dlp plugin ships in the image.)
      YT_PLAYER_CLIENTS: "android_vr,web_embedded,tv"
      PO_TOKEN_PROVIDER_URL: "" # only set (e.g. http://bgutil-pot:4416) when running `--profile pot`
      # MUST match PUBLIC_BASE_URL exactly, or the live-updates WebSocket is rejected (no live panel)
      ALLOWED_WS_ORIGINS: "http://localhost:8080"
    ports: ["8080:8080"]
    volumes: ["cache:/data/cache"]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 25s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
  bgutil-pot:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    profiles: ["pot"]
    restart: unless-stopped
    expose: ["4416"]
volumes:
  cache:
